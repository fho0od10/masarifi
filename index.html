<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستشار الراتب | نظام التتبع المالي الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0B0F19',
                            card: '#161F30',
                            accent: '#3B82F6',
                            success: '#10B981',
                            warning: '#F59E0B'
                        }
                    },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0B0F19; -webkit-tap-highlight-color: transparent; }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-blue-500 selection:text-white">

    <header class="sticky top-0 z-40 bg-brand-dark/80 backdrop-blur-md border-b border-slate-800/60 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-gradient-to-tr from-blue-600 to-emerald-500 rounded-xl shadow-lg shadow-blue-500/10">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div>
                <h1 class="text-base font-black tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">مستشار الراتب</h1>
                <p id="currentCycleLabel" class="text-[10px] text-slate-500 font-medium">الدورة الحالية: جاري التحميل...</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2 rounded-xl bg-slate-800/50 border border-slate-700/40 hover:bg-slate-800 text-slate-400 hover:text-white smooth-transition">
                <svg id="themeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 4.343l.707.707M16.95 15.05a7 7 0 11-9.9 0 7 7 0 019.9 0z"/></svg>
            </button>
            <button onclick="triggerSalaryDrop()" class="bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white text-xs font-bold px-3 py-2 rounded-xl shadow-lg shadow-emerald-900/30 hover:shadow-emerald-500/20 active:scale-95 smooth-transition flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
                نزل الراتب
            </button>
        </div>
    </header>

    <main class="max-w-md w-full mx-auto p-4 flex-1 space-y-4 mb-20 overflow-y-auto">
        <div class="grid grid-cols-3 gap-2.5">
            <div class="bg-brand-card/40 p-3 rounded-2xl border border-slate-800/80 backdrop-blur-sm flex flex-col justify-between">
                <span class="text-[11px] text-slate-400 font-medium">المصاريف</span>
                <span id="statExpenses" class="text-sm font-black text-rose-400 mt-1 truncate">0.00</span>
            </div>
            <div class="bg-brand-card/40 p-3 rounded-2xl border border-slate-800/80 backdrop-blur-sm flex flex-col justify-between">
                <span class="text-[11px] text-slate-400 font-medium">التوفير</span>
                <span id="statSavings" class="text-sm font-black text-emerald-400 mt-1 truncate">0.00</span>
            </div>
            <div class="bg-brand-card/60 p-3 rounded-2xl border border-blue-500/30 backdrop-blur-sm flex flex-col justify-between relative overflow-hidden group">
                <span class="text-[11px] text-blue-400 font-bold">المجموع الكلي</span>
                <span id="statGrandTotal" class="text-sm font-black text-white mt-1 truncate">0.00</span>
            </div>
        </div>

        <div class="bg-brand-card/40 p-4 rounded-2xl border border-slate-800/80 backdrop-blur-sm">
            <div class="relative w-full h-44 flex items-center justify-center">
                <canvas id="expenseChart" class="max-h-full max-w-full"></canvas>
            </div>
        </div>

        <div class="bg-brand-card/50 p-4 rounded-2xl border border-slate-800/80 backdrop-blur-sm shadow-xl">
            <form id="transactionForm" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1">المبلغ (دقيق بالكسور)</label>
                        <input type="number" id="amount" step="0.01" required placeholder="0.00" class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-blue-500 smooth-transition">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1">التاريخ</label>
                        <input type="date" id="date" required class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500 smooth-transition">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">التصنيف</label>
                    <select id="category" required class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500 smooth-transition">
                        <option value="مصاريفي">1 🛒 مصاريفي</option>
                        <option value="مقاضي">2 🥩 مقاضي</option>
                        <option value="مشتريات البيت">3 🏠 مشتريات البيت</option>
                        <option value="بنزين">4 ⛽ بنزين</option>
                        <option value="مطاعم">5 🍔 مطاعم</option>
                        <option value="فواتير">6 📄 فواتير</option>
                        <option value="ترفيه">7 🎮 ترفيه</option>
                        <option value="توفير">8 💰 توفير</option>
                        <option value="مصاريف عامة">9 📦 مصاريف عامة</option>
                        <option value="سياراتي">10 🚗 سياراتي</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">ملاحظة</label>
                    <input type="text" id="note" placeholder="اكتب تفاصيل إضافية هنا..." class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500 smooth-transition">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs py-2.5 rounded-xl shadow-lg shadow-blue-900/30 active:scale-[0.98] smooth-transition">
                    تسجيل العملية بالدفتر
                </button>
            </form>
        </div>

        <div class="bg-brand-card/30 p-3 rounded-2xl border border-slate-800/80 space-y-2">
            <div class="flex gap-2">
                <input type="text" id="searchBar" oninput="renderTransactions()" placeholder="بحث في الملاحظات..." class="w-full bg-slate-900/50 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500 smooth-transition">
                <select id="filterCategory" onchange="renderTransactions()" class="bg-slate-900/50 border border-slate-800 rounded-xl px-2 py-2 text-xs text-white focus:outline-none focus:border-blue-500 smooth-transition">
                    <option value="الكل">كل التصانيف</option>
                    <option value="مصاريفي">🛒 مصاريفي</option>
                    <option value="مقاضي">🥩 مقاضي</option>
                    <option value="مشتريات البيت">🏠 مشتريات البيت</option>
                    <option value="بنزين">⛽ بنزين</option>
                    <option value="مطاعم">🍔 مطاعم</option>
                    <option value="فواتير">📄 فواتير</option>
                    <option value="ترفيه">🎮 ترفيه</option>
                    <option value="توفير">💰 توفير</option>
                    <option value="مصاريف عامة">📦 مصاريف عامة</option>
                    <option value="سياراتي">🚗 سياراتي</option>
                </select>
            </div>
        </div>

        <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
                <h4 class="text-xs font-bold text-slate-400">سجل الدورة الحالية</h4>
                <button onclick="exportToCSV()" class="text-[11px] text-blue-400 hover:underline flex items-center gap-1">تصدير البيانات CSV</button>
            </div>
            <div id="transactionsContainer" class="space-y-2 max-h-64 overflow-y-auto"></div>
        </div>

        <div class="bg-brand-card/20 p-4 rounded-2xl border border-slate-800/60">
            <h3 class="text-xs font-bold text-slate-400 mb-3 flex items-center gap-1">أرشيف الدورات المغلقة</h3>
            <div id="archiveContainer" class="space-y-2 text-xs">
                <p class="text-[11px] text-slate-600 text-center py-2">لا توجد دورات مؤرشفة محلياً حتى الآن.</p>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-brand-dark/95 border-t border-slate-850 backdrop-blur-lg px-4 py-3 flex justify-around items-center z-50">
        <div id="syncStatus" class="text-[11px] text-slate-400 flex items-center gap-1.5 w-full justify-center">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span>النظام متصل سحابياً وآمن لعدة سنوات</span>
        </div>
    </footer>

    <script>
        // احقن الرابط الخاص بك بالأسفل بين علامتي التنصيص
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkNaQEYV06YM9K84dgR3fqqboAlix06Df_n_bRHobtu8MdeZYKATt71Joe7D5T8nE/exec";

        const categoryEmojis = {
            "مصاريفي": "🛒", "مقاضي": "🥩", "مشتريات البيت": "🏠", "بنزين": "⛽", 
            "مطاعم": "🍔", "فواتير": "📄", "ترفيه": "🎮", "توفير": "💰", 
            "مصاريف عامة": "📦", "سياراتي": "🚗"
        };

        let state = { expenses: [], archive: [], cycleId: "" };
        let chartInstance = null;

        window.onload = function() {
            initTheme();
            if(!localStorage.getItem('salary_cycle_id')) { startNewCycle(); } 
            else {
                state.cycleId = localStorage.getItem('salary_cycle_id');
                state.expenses = JSON.parse(localStorage.getItem('salary_expenses') || '[]');
                state.archive = JSON.parse(localStorage.getItem('salary_archive') || '[]');
            }
            document.getElementById('date').valueAsDate = new Date();
            updateDashboard();
        };

        function startNewCycle() {
            const now = new Date();
            const id = "CYCLE-" + now.getFullYear() + "-" + (now.getMonth()+1) + "-" + now.getDate() + "-" + now.getTime();
            state.cycleId = id; state.expenses = [];
            localStorage.setItem('salary_cycle_id', id);
            localStorage.setItem('salary_expenses', JSON.stringify([]));
        }

        function updateDashboard() {
            document.getElementById('currentCycleLabel').innerText = `معرف الدورة الحالية: ${state.cycleId.substring(0, 15)}`;
            let totalExpenses = 0.00; let totalSavings = 0.00;
            state.expenses.forEach(item => {
                let amt = parseFloat(item.amount) || 0;
                if(item.category === "توفير") { totalSavings += amt; } else { totalExpenses += amt; }
            });
            let grandTotal = totalExpenses + totalSavings;
            document.getElementById('statExpenses').innerText = totalExpenses.toFixed(2);
            document.getElementById('statSavings').innerText = totalSavings.toFixed(2);
            document.getElementById('statGrandTotal').innerText = grandTotal.toFixed(2);
            renderTransactions(); renderArchive(); buildChart(totalExpenses, totalSavings);
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value.trim();
            if (isNaN(amount) || amount <= 0) return;

            const newTransaction = { id: "TXN-" + new Date().getTime(), amount: amount.toFixed(2), date: date, category: category, note: note || "بدون ملاحظة" };
            state.expenses.unshift(newTransaction);
            localStorage.setItem('salary_expenses', JSON.stringify(state.expenses));
            document.getElementById('amount').value = ''; document.getElementById('note').value = '';
            updateDashboard();
        }

        function renderTransactions() {
            const container = document.getElementById('transactionsContainer'); container.innerHTML = '';
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const filterCat = document.getElementById('filterCategory').value;
            const filtered = state.expenses.filter(item => {
                return (item.note.toLowerCase().includes(searchTerm) || item.category.includes(searchTerm)) && (filterCat === "الكل" || item.category === filterCat);
            });
            if(filtered.length === 0) { container.innerHTML = `<p class="text-[11px] text-slate-600 text-center py-4">لا توجد عمليات تطابق الفلترة.</p>`; return; }
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 flex justify-between items-center smooth-transition hover:border-slate-750";
                card.innerHTML = `<div class="flex items-center gap-2.5"><span class="text-xl p-1.5 bg-slate-800/80 rounded-lg">${categoryEmojis[item.category] || '💸'}</span><div><div class="text-xs font-bold text-white">${item.category}</div><div class="text-[10px] text-slate-500">${item.date} • <span class="text-slate-400 font-medium">${item.note}</span></div></div></div><div class="flex items-center gap-3"><span class="text-xs font-black ${item.category === 'توفير' ? 'text-emerald-400' : 'text-slate-200'}">${parseFloat(item.amount).toFixed(2)}</span><button onclick="deleteTransaction('${item.id}')" class="text-slate-600 hover:text-rose-400 p-1 smooth-transition"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div>`;
                container.appendChild(card);
            });
        }

        function deleteTransaction(id) { state.expenses = state.expenses.filter(item => item.id !== id); localStorage.setItem('salary_expenses', JSON.stringify(state.expenses)); updateDashboard(); }

        function triggerSalaryDrop() {
            if(state.expenses.length === 0) { alert("لا توجد مصاريف لتأرشفها حالياً."); return; }
            if(!confirm("هل أنت متأكد من نزول الراتب الجديد؟")) return;
            let totalExpenses = 0; let totalSavings = 0;
            state.expenses.forEach(item => { let amt = parseFloat(item.amount) || 0; if(item.category === "توفير") totalSavings += amt; else totalExpenses += amt; });

            const archiveEntry = { cycleId: state.cycleId, endDate: new Date().toLocaleDateString('en-US'), totalExpenses: totalExpenses.toFixed(2), totalSavings: totalSavings.toFixed(2), grandTotal: (totalExpenses + totalSavings).toFixed(2), expensesSnapshot: state.expenses };

            if(WEB_APP_URL && WEB_APP_URL !== "هنا_ضع_الرابط_السري") {
                const statusFooter = document.getElementById('syncStatus');
                statusFooter.innerHTML = `<span class="w-2 h-2 rounded-full bg-warning animate-ping"></span> <span class="text-warning">جاري مزامنة الأرشيف سحابياً...</span>`;
                fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "saveCycle", cycleId: archiveEntry.cycleId, endDate: archiveEntry.endDate, totalExpenses: archiveEntry.totalExpenses, totalSavings: archiveEntry.totalSavings, grandTotal: archiveEntry.grandTotal, expenses: archiveEntry.expensesSnapshot }) })
                .then(() => { statusFooter.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> <span class="text-emerald-400">تم الحفظ السحابي بنجاح تامر!</span>`; })
                .catch(() => { statusFooter.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500"></span> <span class="text-rose-400">فشلت المزامنة، حُفظ محلياً!</span>`; });
            }

            state.archive.unshift(archiveEntry); localStorage.setItem('salary_archive', JSON.stringify(state.archive));
            startNewCycle(); updateDashboard();
        }

        function renderArchive() {
            const container = document.getElementById('archiveContainer'); if(state.archive.length === 0) return; container.innerHTML = '';
            state.archive.forEach(arc => {
                const div = document.createElement('div'); div.className = "p-3 bg-slate-900/40 border border-slate-800 rounded-xl space-y-1";
                div.innerHTML = `<div class="flex justify-between font-bold text-slate-300 text-[11px]"><span>تاريخ الإغلاق: ${arc.endDate}</span><span class="text-blue-400">مجموع: ${arc.grandTotal}</span></div><div class="flex justify-between text-[10px] text-slate-500"><span>المصاريف: ${arc.totalExpenses}</span><span class="text-emerald-500">التوفير: ${arc.totalSavings}</span></div>`;
                container.appendChild(div);
            });
        }

        function buildChart(expenses, savings) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(chartInstance) { chartInstance.destroy(); }
            if(expenses === 0 && savings === 0) { ctx.clearRect(0, 0, 200, 200); return; }
            chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['المصاريف', 'التوفير'], datasets: [{ data: [expenses, savings], backgroundColor: ['#FB7185', '#34D399'], borderColor: '#161F30', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94A3B8', font: { family: 'Tajawal', size: 10 } } } }, cutout: '75%' } });
        }

        function exportToCSV() {
            if(state.expenses.length === 0) return;
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + ["التاريخ", "المبلغ", "التصنيف", "الملاحظة"].join(",") + "\n";
            state.expenses.forEach(item => { csvContent += [item.date, item.amount, item.category, `"${item.note}"`].join(",") + "\n"; });
            const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `مصاريف_${state.cycleId}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'light') { document.documentElement.classList.remove('dark'); document.body.style.backgroundColor = "#F8FAFC"; toggleThemeIcon(false); } 
            else { document.documentElement.classList.add('dark'); document.body.style.backgroundColor = "#0B0F19"; toggleThemeIcon(true); }
        }

        function toggleDarkMode() {
            if (document.documentElement.classList.contains('dark')) { document.documentElement.classList.remove('dark'); document.body.style.backgroundColor = "#F8FAFC"; localStorage.setItem('theme', 'light'); toggleThemeIcon(false); } 
            else { document.documentElement.classList.add('dark'); document.body.style.backgroundColor = "#0B0F19"; localStorage.setItem('theme', 'dark'); toggleThemeIcon(true); }
            updateDashboard();
        }

        function toggleThemeIcon(isDark) {
            const icon = document.getElementById('themeIcon');
            if(isDark) { icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 4.343l.707.707M16.95 15.05a7 7 0 11-9.9 0 7 7 0 019.9 0z"/>`; } 
            else { icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>`; }
        }
    </script>
</body>
</html>
