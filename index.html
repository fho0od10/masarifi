<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مستشار الراتب | نظام المزامنة والتحليل المتقدم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { dark: '#0B0F19', card: '#161F30', accent: '#3B82F6', success: '#10B981' } },
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0B0F19; -webkit-tap-highlight-color: transparent; }
        .smooth-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="sticky top-0 z-40 bg-brand-dark/80 backdrop-blur-md border-b border-slate-800/60 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-gradient-to-tr from-blue-600 to-emerald-500 rounded-xl">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div>
                <h1 class="text-base font-black bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">مستشار الراتب</h1>
                <p id="syncStatusLabel" class="text-[10px] text-amber-400 font-medium">جاري المزامنة السحابية...</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="fetchLiveData()" class="p-2 rounded-xl bg-slate-800/50 border border-slate-700/40 text-slate-300 hover:text-white active:scale-95 smooth-transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.212 9H18"/></svg>
            </button>
            <button onclick="triggerSalaryDrop()" class="bg-gradient-to-r from-emerald-600 to-teal-500 text-white text-xs font-bold px-3 py-2 rounded-xl shadow-lg active:scale-95 smooth-transition flex items-center gap-1">
                نزل الراتب
            </button>
        </div>
    </header>

    <main class="max-w-md w-full mx-auto p-4 flex-1 space-y-4 mb-20 overflow-y-auto">
        <div class="grid grid-cols-3 gap-2.5">
            <div class="bg-brand-card/40 p-3 rounded-2xl border border-slate-800/80">
                <span class="text-[11px] text-slate-400 font-medium">المصاريف</span>
                <span id="statExpenses" class="text-sm font-black text-rose-400 block mt-1 truncate">0.00</span>
            </div>
            <div class="bg-brand-card/40 p-3 rounded-2xl border border-slate-800/80">
                <span class="text-[11px] text-slate-400 font-medium">التوفير</span>
                <span id="statSavings" class="text-sm font-black text-emerald-400 block mt-1 truncate">0.00</span>
            </div>
            <div class="bg-brand-card/60 p-3 rounded-2xl border border-blue-500/30">
                <span class="text-[11px] text-blue-400 font-bold">المجموع الكلي</span>
                <span id="statGrandTotal" class="text-sm font-black text-white block mt-1 truncate">0.00</span>
            </div>
        </div>

        <div class="bg-brand-card/40 p-4 rounded-2xl border border-slate-800/80">
            <div class="relative w-full h-44 flex items-center justify-center">
                <canvas id="expenseChart" class="max-h-full max-w-full"></canvas>
            </div>
        </div>

        <div class="bg-brand-card/50 p-4 rounded-2xl border border-slate-800/80">
            <form id="transactionForm" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1">المبلغ</label>
                        <input type="number" id="amount" step="0.01" required placeholder="0.00" class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-sm font-bold text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1">التاريخ</label>
                        <input type="date" id="date" required class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">التصنيف</label>
                    <select id="category" required class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500">
                        <option value="مصاريفي">1 🛒 مصاريفي</option>
                        <option value="مقاضي">2 🥩 مقاضي</option>
                        <option value="مشتريات البيت">3 🏠 مشتريات البيت</option>
                        <option value="بنزين">4 ⛽ بنزين</option>
                        <option value="مطاعم">5 🍔 مطاعم</option>
                        <option value="فواتير">6 📄 فواتير</option>
                        <option value="ترفيه">7 🎮 ترفيه</option>
                        <option value="توفير">8 💰 توفير</option>
                        <option value="مصاريف عامة">9 📦 مصاريف عامة</option>
                        <option value="سياراتي">10 🚗 سياراتي</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">ملاحظة</label>
                    <input type="text" id="note" placeholder="اكتب تفاصيل إضافية هنا..." class="w-full bg-slate-900/80 border border-slate-700/50 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs py-2.5 rounded-xl smooth-transition">
                    تسجيل وإرسال مباشر للسحابة
                </button>
            </form>
        </div>

        <div class="space-y-2">
            <h4 class="text-xs font-bold text-slate-400 px-1">العمليات الحالية المسجلة بسحابة</h4>
            <div id="transactionsContainer" class="space-y-2 max-h-48 overflow-y-auto"></div>
        </div>

        <div class="bg-brand-card/20 p-4 rounded-2xl border border-slate-800/60">
            <h3 class="text-xs font-bold text-slate-400 mb-3 flex items-center gap-1">🗄️ تحليل الأرشيف التاريخي والتصانيف المغلقة</h3>
            <div id="archiveContainer" class="space-y-3 text-xs max-h-64 overflow-y-auto"></div>
        </div>
    </main>

    <script>
        // احقن الرابط الخاص بك بالأسفل بين علامتي التنصيص
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxkNaQEYV06YM9K84dgR3fqqboAlix06Df_n_bRHobtu8MdeZYKATt71Joe7D5T8nE/exec";

        const categoryEmojis = {
            "مصاريفي": "🛒", "مقاضي": "🥩", "مشتريات البيت": "🏠", "بنزين": "⛽", 
            "مطاعم": "🍔", "فواتير": "📄", "ترفيه": "🎮", "توفير": "💰", 
            "مصاريف عامة": "📦", "سياراتي": "🚗"
        };

        let liveExpenses = [];
        let liveArchive = [];
        let chartInstance = null;

        window.onload = function() {
            try {
                document.getElementById('date').valueAsDate = new Date();
            } catch(e) {
                let today = new Date();
                let dd = String(today.getDate()).padStart(2, '0');
                let mm = String(today.getMonth() + 1).padStart(2, '0');
                let yyyy = today.getFullYear();
                document.getElementById('date').value = yyyy + '-' + mm + '-' + dd;
            }
            fetchLiveData();
        };

        function formatDate(dateStr) {
            if(!dateStr) return "";
            try {
                let d = new Date(dateStr);
                if(isNaN(d.getTime())) return dateStr.split('T')[0] || dateStr;
                return d.toLocaleDateString('en-US');
            } catch(e) {
                return dateStr;
            }
        }

        function fetchLiveData() {
            if(!WEB_APP_URL || WEB_APP_URL === "هنا_ضع_الرابط_السري") return;
            
            const statusLabel = document.getElementById('syncStatusLabel');
            statusLabel.innerText = "جاري مزامنة السحابة...";
            statusLabel.className = "text-[10px] text-amber-400 font-medium animate-pulse";
            
            // جلب العمليات الحية مع دعم كسر الحظر الفيدرالي للمتصفحات (CORS Mode)
            fetch(WEB_APP_URL, { method: "GET", credentials: "omit" })
            .then(res => res.json())
            .then(data => { 
                liveExpenses = data || []; 
                updateDashboard(); 
                statusLabel.innerText = "البيانات متزامنة وحية ع السحابة";
                statusLabel.className = "text-[10px] text-emerald-400 font-medium";
            })
            .catch((err) => {
                console.error("Live Fetch Error: ", err);
                statusLabel.innerText = "أوفلاين - فشل تحديث البيانات";
                statusLabel.className = "text-[10px] text-rose-400 font-medium";
            });
            
            fetch(`${WEB_APP_URL}?type=archive`, { method: "GET", credentials: "omit" })
            .then(res => res.json())
            .then(data => { liveArchive = data || []; renderArchive(); })
            .catch(err => console.error("Archive Fetch Error: ", err));
        }

        function updateDashboard() {
            let totalExpenses = 0.00; let totalSavings = 0.00;
            liveExpenses.forEach(item => {
                let amt = parseFloat(item["المبلغ"]) || 0;
                if(item["التصنيف"] === "توفير") totalSavings += amt; else totalExpenses += amt;
            });
            document.getElementById('statExpenses').innerText = totalExpenses.toFixed(2);
            document.getElementById('statSavings').innerText = totalSavings.toFixed(2);
            document.getElementById('statGrandTotal').innerText = (totalExpenses + totalSavings).toFixed(2);
            renderTransactions(); 
            buildChart(totalExpenses, totalSavings);
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const note = document.getElementById('note').value.trim() || "بدون ملاحظة";
            if (isNaN(amount) || amount <= 0) return;

            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "saveCycle", cycleId: "LIVE-CYCLE", expenses: [{ date: date, amount: amount, category: category, note: note }] }) })
            .then(() => {
                document.getElementById('amount').value = ''; document.getElementById('note').value = '';
                setTimeout(fetchLiveData, 1500);
            });
        }

        function triggerSalaryDrop() {
            if(liveExpenses.length === 0) { alert("لا توجد مصاريف حالية لترحيلها."); return; }
            if(!confirm("هل أنت متأكد من نزول الراتب الجديد؟ سيتم إغلاق الشهر وحساب توزيع التصانيف سحابياً.")) return;

            let totalExpenses = 0; let totalSavings = 0;
            liveExpenses.forEach(item => { let amt = parseFloat(item["المبلغ"]) || 0; if(item["التصنيف"] === "توفير") totalSavings += amt; else totalExpenses += amt; });

            const payload = { action: "archiveCurrentCycle", endDate: new Date().toLocaleDateString('en-US'), totalExpenses: totalExpenses.toFixed(2), totalSavings: totalSavings.toFixed(2), grandTotal: (totalExpenses + totalSavings).toFixed(2) };

            fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
            .then(() => { setTimeout(fetchLiveData, 1500); });
        }

        function renderTransactions() {
            const container = document.getElementById('transactionsContainer'); container.innerHTML = '';
            if(liveExpenses.length === 0) { container.innerHTML = `<p class="text-[11px] text-slate-600 text-center py-4">الدورة الحالية فارغة.</p>`; return; }
            [...liveExpenses].reverse().forEach(item => {
                let cleanDate = formatDate(item["التاريخ"]);
                const card = document.createElement('div'); card.className = "bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 flex justify-between items-center";
                card.innerHTML = `<div class="flex items-center gap-2.5"><span class="text-xl p-1.5 bg-slate-800/80 rounded-lg">${categoryEmojis[item["التصنيف"]] || '💸'}</span><div><div class="text-xs font-bold text-white">${item["التصنيف"]}</div><div class="text-[10px] text-slate-500">${cleanDate} • <span class="text-slate-400 font-medium">${item["الملاحظة"]}</span></div></div></div><span class="text-xs font-black ${item["التصنيف"] === 'توفير' ? 'text-emerald-400' : 'text-slate-200'}">${parseFloat(item["المبلغ"]).toFixed(2)}</span>`;
                container.appendChild(card);
            });
        }

        function toggleDetails(index) {
            const el = document.getElementById(`details-${index}`);
            if(el.classList.contains('hidden')) el.classList.remove('hidden'); else el.classList.add('hidden');
        }

        function renderArchive() {
            const container = document.getElementById('archiveContainer'); container.innerHTML = '';
            if(liveArchive.length === 0) { container.innerHTML = `<p class="text-[11px] text-slate-600 text-center py-2">لا توجد دورات مؤرشفة سحابياً بعد.</p>`; return; }
            
            liveArchive.forEach((arc, index) => {
                let detailsHtml = '';
                for (let cat in arc.details) {
                    let val = parseFloat(arc.details[cat]);
                    if (val > 0) {
                        detailsHtml += `<div class="flex justify-between items-center bg-slate-900/30 px-2 py-1 rounded border border-slate-800/40 text-[10px]"><span>${categoryEmojis[cat] || '▪️'} ${cat}</span><span class="font-bold text-slate-300">${val.toFixed(2)} ريال</span></div>`;
                    }
                }
                
                let cleanEndDate = formatDate(arc.endDate);
                const div = document.createElement('div'); div.className = "p-3 bg-slate-900/40 border border-slate-800 rounded-xl space-y-2 text-[11px]";
                div.innerHTML = `
                    <div class="flex justify-between font-bold text-slate-300">
                        <span>🗓️ إغلاق: ${cleanEndDate}</span>
                        <span class="text-blue-400">المجموع: ${parseFloat(arc.grandTotal).toFixed(2)}</span>
                    </div>
                    <div class="flex justify-between text-[10px] text-slate-500 pb-1 border-b border-slate-800/40">
                        <span>المصاريف: ${parseFloat(arc.totalExpenses).toFixed(2)}</span>
                        <span class="text-emerald-500">التوفير: ${parseFloat(arc.totalSavings).toFixed(2)}</span>
                    </div>
                    <button onclick="toggleDetails(${index})" class="w-full text-center text-[10px] text-blue-400/80 hover:text-blue-400 font-medium py-0.5 border border-blue-500/10 rounded bg-blue-500/5">عرض توزيع المصاريف وين راحت 👇</button>
                    <div id="details-${index}" class="hidden space-y-1 pt-1">${detailsHtml}</div>
                `;
                container.appendChild(div);
            });
        }

        function buildChart(expenses, savings) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            if(expenses === 0 && savings === 0) { ctx.clearRect(0, 0, 200, 200); return; }
            chartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: ['المصاريف', 'التوفير'], datasets: [{ data: [expenses, savings], backgroundColor: ['#FB7185', '#34D399'], borderColor: '#161F30', borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94A3B8', font: { family: 'Tajawal', size: 10 } } } }, cutout: '75%' } });
        }
    </script>
</body>
</html>
